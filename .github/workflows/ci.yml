name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --json > audit-results.json 2>&1 || true
        continue-on-error: true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Display audit summary
        run: |
          echo "## 🔒 Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f audit-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.metadata.vulnerabilities' audit-results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || cat audit-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate (build, lint, typecheck, unit tests + coverage)
        run: npm run check

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            packages/core/coverage/lcov.info
            packages/next/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 30

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E (examples/nextjs-app)
        run: npm run test:e2e

      - name: Core size budget
        run: npm run size
