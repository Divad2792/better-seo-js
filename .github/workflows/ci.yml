name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test + Coverage
        run: npm run test:coverage

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: E2E
        run: npm run test:e2e

      - name: Core size budget
        run: npm run size

      - name: Verify bundle size < 10KB
        run: |
          SIZE=$(cd packages/core && cat dist/index.js | gzip | wc -c)
          echo "Core bundle: ${SIZE}B"
          [ "$SIZE" -le 10240 ] || { echo "FAIL: Core bundle ${SIZE}B exceeds 10KB"; exit 1; }

      - name: Extract coverage metrics
        id: coverage
        run: |
          mkdir -p badges
          for pkg in core next better-seo-assets better-seo-cli react better-seo-crawl better-seo-compiler; do
            SHORT=${pkg#better-seo-}
            SHORT=${SHORT%-assets}
            SHORT=${SHORT%-crawl}
            SHORT=${SHORT%-compiler}
            SUMMARY="packages/${pkg}/coverage/coverage-summary.json"
            if [ -f "$SUMMARY" ]; then
              LINES=$(jq -r '.total.lines.pct' "$SUMMARY")
              echo "{\"schemaVersion\":1,\"label\":\"coverage (${SHORT})\",\"message\":\"${LINES}%\",\"color\":\"green\"}" > "badges/${SHORT}.json"
              echo "${SHORT}=${LINES}" >> $GITHUB_OUTPUT
            fi
          done

      - name: Commit coverage badges
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --staged --quiet || git commit -m "ci: update coverage badges"
          git push origin main
