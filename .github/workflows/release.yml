name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Publish all packages
        run: npx changeset publish --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Verify install — @better-seo/core
        run: |
          cd /tmp && mkdir _v && cd _v
          npm init -y
          npm install @better-seo/core
          node -e "const { createSEO, webPage, serializeJSONLD } = require('@better-seo/core'); const s = createSEO({ title: 'verify' }, { baseUrl: 'https://x.com' }); console.log('OK:', s.meta.title)"
          cd / && rm -rf /tmp/_v

      - name: Verify install — @better-seo/next
        run: |
          cd /tmp && mkdir _v2 && cd _v2
          npm init -y
          npm install @better-seo/core @better-seo/next
          node -e "const { seo } = require('@better-seo/next'); console.log('OK: next adapter loaded')"
          cd / && rm -rf /tmp/_v2
