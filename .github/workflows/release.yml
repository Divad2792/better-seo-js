# Semver + CHANGELOG via Changesets; Version PR merges to main → npm publish.
# Requires: NPM_TOKEN (npm granular access token with publish) in repo secrets.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build packages (release step also runs full CI via npm run publish)
        run: npm run build

      # Provenance requires GitHub OIDC + id-token: write; local `changeset publish` must not set publishConfig.provenance.
      - name: Enable npm publish provenance (GitHub Actions only)
        run: npm config set provenance true

      # Creates or updates "Version Packages" PR when .changeset/*.md exist;
      # After that PR is merged (no pending changesets), runs publish (same as local: npm run publish).
      - name: Changesets — version PR + npm publish
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: npm run release:version
          publish: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
